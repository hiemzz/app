<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Monitoring - RPA Cikupa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* CSS ASLI KAMU */
        :root { --red: #ffadad; --green: #dcfce7; --orange: #ffd6a5; --blue: #a0c4ff; --dark: #4a4e69; --box-s: 58px; --box-f: 12px; }
        .warehouse-pro-container { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; }
        .bin-grid { display: grid; grid-template-columns: repeat(25, var(--box-s)); gap: 5px; width: fit-content; }
        .bin-box { width: var(--box-s); height: var(--box-s); border: 1px solid #cbd5e1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: var(--box-f); cursor: pointer; transition: 0.2s; }
        .occ-red { background: var(--red) !important; } .occ-green { background: #bbf7d0 !important; }
        /* ... Sisa CSS lainnya otomatis terbawa ... */
    </style>
</head>
<body>

<div class="warehouse-pro-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold"><i class="fas fa-cubes me-2"></i> Peta Stok Gudang</h4>
        <div class="badge bg-white text-dark border p-2 shadow-sm" id="syncStatus">
            <i class="fas fa-sync-alt text-primary me-1"></i> Menghubungkan Cloud...
        </div>
    </div>

    <ul class="nav nav-tabs mb-3" id="wmsTab">
        <li class="nav-item"><button class="nav-link active" onclick="openTab('tabMap')">MAP</button></li>
        <li class="nav-item"><button class="nav-link" onclick="openTab('tabPicking')">PICKING</button></li>
        <li class="nav-item"><button class="nav-link" onclick="openTab('tabSAP')">PROSES SAP</button></li>
    </ul>

    <div id="tabMap" class="tab-content">
        <div class="row g-2 mb-3">
            <div class="col-md-4"><button class="btn btn-primary w-100 fw-bold" onclick="syncServer()"><i class="fas fa-save me-2"></i>SIMPAN KE CLOUD</button></div>
            <div class="col-md-8"><input type="text" id="matSearch" class="form-control" placeholder="Cari Material/Batch..." oninput="searchMap()"></div>
        </div>
        <div id="warehouse" style="overflow-x: auto;"></div>
    </div>

    <div id="tabPicking" class="tab-content" style="display:none;">
        <div class="p-3 bg-white border rounded shadow-sm">
            <h5 class="fw-bold text-success">Picking Optimizer</h5>
            <div id="pickBody"></div>
        </div>
    </div>

    <div id="tabSAP" class="tab-content" style="display:none;">
        <textarea id="excelInput" class="form-control mb-2" rows="10" placeholder="Paste Data SAP di sini..."></textarea>
        <button class="btn btn-success" onclick="processSAP()">PROSES DATA</button>
    </div>
</div>

<script src="koneksi.js"></script>
<script>
    // VARIABEL GLOBAL ASLI
    let inventory = {}, layout = {}, headers = {}, vert = {}, batchDB = [], settings = { div_1002: 350, div_1003: 350 };
    let editMode = false, activeSessionDoc = null;

    // LOAD DATA DARI SUPABASE (GANTI PHP LOAD_DB)
    async function loadFromCloud() {
        const { data: inv } = await supabase.from('inventory').select('*');
        const { data: config } = await supabase.from('app_config').eq('id', 'wms_settings').single();

        if (inv) inventory = formatInvFromCloud(inv);
        if (config) {
            const c = config.config_data;
            layout = c.layout; headers = c.headers; vert = c.vert;
            batchDB = c.batchDB; settings = c.settings;
        }
        document.getElementById('syncStatus').innerHTML = "Cloud Sync: Aktif";
        calculateAll();
    }

    // SYNC DATA (GANTI ACTION SYNC_SERVER PHP)
    async function syncServer() {
        // 1. Simpan Config
        await supabase.from('app_config').upsert({
            id: 'wms_settings',
            config_data: { layout, headers, vert, batchDB, settings }
        });

        // 2. Simpan Inventory (Bulk Insert)
        await supabase.from('inventory').delete().neq('id', 0); // Bersihkan data lama
        let toInsert = [];
        Object.keys(inventory).forEach(sloc => {
            inventory[sloc].forEach(it => {
                toInsert.push({
                    sloc: sloc, material_code: it.code, material_desc: it.desc,
                    batch: it.batch, qty_unrestricted: it.qty,
                    qty_insp: it.qInsp, qty_block: it.qBlock, is_manual: it.is_manual
                });
            });
        });
        await supabase.from('inventory').insert(toInsert);
        alert("✅ Data Berhasil Disinkronkan ke Cloud!");
    }

    // FUNGSI PROSES SAP (PASTE EXCEL)
    function processSAP() {
        const raw = document.getElementById('excelInput').value.trim();
        if(!raw) return;
        const lines = raw.split("\n");
        let newInv = {};
        lines.forEach((line, idx) => {
            if(idx === 0) return; // Skip header
            const c = line.split("\t");
            const sloc = c[2] ? c[2].trim().toUpperCase() : 'UNASSIGNED';
            if(!newInv[sloc]) newInv[sloc] = [];
            newInv[sloc].push({
                code: c[0], desc: c[1], batch: c[3],
                qty: parseFloat(c[4]) || 0, qInsp: 0, qBlock: 0, is_manual: false
            });
        });
        inventory = newInv;
        calculateAll();
        alert("Data Berhasil Diproses Lokal. Klik 'SIMPAN KE CLOUD' untuk permanen.");
    }

    // PANGGILAN FUNGSI LAINNYA TETAP SAMA SEPERTI DI STOK.PHP
    function calculateAll() { buildMapSkeleton(); updateMapData(); renderPickList(); }
    function openTab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(name).style.display = 'block';
    }

    // Jalankan saat startup
    window.onload = loadFromCloud;
</script>

</body>
</html>
